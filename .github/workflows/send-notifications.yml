name: Send Daily Notifications

on:
  schedule:
    # Runs daily at 07:00 UTC (08:00 London BST)
    # GitHub Actions doesn't reliably support per-minute schedules on free accounts
    # so we run once per day and send to all enabled subscriptions
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Trigger notification endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/send-notifications")
          
          echo "Response status: $response"
          
          if [ "$response" != "200" ]; then
            echo "Warning: unexpected response $response"
            exit 1
          fi
